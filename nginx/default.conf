server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Compression (WP-0.1) ---
    # The base image gzips text/html only; add JS/CSS/SVG/JSON so bundles ship
    # compressed. Brotli is intentionally NOT enabled: nginx:stable-alpine ships
    # without the brotli module, so `brotli on;` would fail to start. To add
    # brotli, build a custom nginx image with ngx_brotli and re-add here.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/css application/javascript application/json application/xml image/svg+xml text/plain application/x-protobuf;

    # --- Server-side 301 redirects (WP-0.3) ---
    # Ported from the (Netlify-only, never-executed) static/_redirects plus two
    # gaps proven live: /blog with no trailing slash, and the old PumpFun casing.

    # Stale docs blog → main site blog
    location /blog/ {
        return 301 https://bitquery.io/blog/;
    }
    # /blog without a trailing slash previously fell through to the SPA fallback
    # and soft-404'd; send it to the same place as /blog/.
    location = /blog {
        return 301 https://bitquery.io/blog/;
    }

    # Old PumpFun casing (Google-indexed; went dead when the dir was renamed to
    # Pumpfun). `^~` is a CASE-SENSITIVE prefix match, so correctly-cased
    # /Pumpfun/ URLs never enter this block — no redirect loop.
    location ^~ /docs/blockchain/Solana/PumpFun {
        rewrite ^/docs/blockchain/Solana/PumpFun(/.*)?$ /docs/blockchain/Solana/Pumpfun$1 permanent;
    }

    # Legacy MCP path (was a client-side redirect only)
    location = /docs/usecases/MCP  { return 301 /docs/mcp/mcp-server/; }
    location = /docs/usecases/MCP/ { return 301 /docs/mcp/mcp-server/; }

    # Self-hosted fonts + webpack-hashed /assets (filenames change on update)
    location ~* ^/(fonts|assets)/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Doc images/videos are updated in place — cache hard but allow revalidation
    location /img/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # --- Real 404s (WP-0.2) ---
    # The site is a fully static Docusaurus export (every route is a real
    # index.html, and build/404.html exists). Serve that with a genuine 404
    # status instead of the old `try_files ... /index.html` SPA fallback, which
    # returned 200 + the homepage shell for every unknown URL (site-wide soft-404).
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }
}
