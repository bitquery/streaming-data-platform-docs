server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Stale docs blog → main site blog (Task 5)
    location /blog/ {
        return 301 https://bitquery.io/blog/;
    }

    # Self-hosted fonts + webpack-hashed /assets (filenames change on update)
    location ~* ^/(fonts|assets)/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Doc images/videos are updated in place — cache hard but allow revalidation
    location /img/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }
}
